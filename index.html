<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twin Curves Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#wrapper {
  position: relative;
  background: #000;
  overflow: hidden;
}
canvas#bg-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}
canvas#curve-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 2;
}
#img-layer {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}
/* 青点用画像: 上端が青点に重なる・1/6サイズ */
#img-layer img.blue-img {
  position: absolute;
  object-fit: contain;
  object-position: top center;
  opacity: 0;
  transition: opacity 0.6s ease;
}
/* 赤点用画像: 下端が赤点に重なる・1/6サイズ */
#img-layer img.red-img {
  position: absolute;
  object-fit: contain;
  object-position: bottom center;
  opacity: 0;
  transition: opacity 0.6s ease;
}
#hud {
  position: absolute;
  bottom: 20px; left: 0; right: 0;
  text-align: center;
  z-index: 3;
  pointer-events: none;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.55);
}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="bg-canvas"></canvas>
  <div id="img-layer">
    <!--
      images/ フォルダに画像を置いてください。
      blue-img: 画像の上端が青点(y=sinx-1)に重なります
      red-img : 画像の下端が赤点(y=sin(πx)+1)に重なります

      img-scene1-p1 … シーン① 青点用
      img-scene1-p2 … シーン① 赤点用
      img-scene2-p1 … シーン② 青点用
      img-scene2-p2 … シーン② 赤点用
      img-scene3-p1 … シーン③ 青点用
      img-scene3-p2 … シーン③ 赤点用
    -->
    <img id="img-scene1-p1" class="blue-img" src="images/scene1_blue.png" alt="">
    <img id="img-scene1-p2" class="red-img"  src="images/scene1_red.png"  alt="">
    <img id="img-scene2-p1" class="blue-img" src="images/scene2_blue.png" alt="">
    <img id="img-scene2-p2" class="red-img"  src="images/scene2_red.png"  alt="">
    <img id="img-scene3-p1" class="blue-img" src="images/scene3_blue.png" alt="">
    <img id="img-scene3-p2" class="red-img"  src="images/scene3_red.png"  alt="">
  </div>
  <canvas id="curve-canvas"></canvas>
  <div id="hud">x = 0.0000</div>
</div>

<script>
(function () {
  /* ---- パラメータ ---- */
  const TARGET_X    = 2005.55;
  const SLOW_RANGE  = 1;    // この距離から減速開始
  const ZOOM_RANGE  = 1;    // この距離からズーム開始
  const SCENE2_HALF = 0.5;  // ★ シーン②の片側幅（小さいほど短い）
  const ZOOM_MAX     = 30;
  const BASE_SPEED   = 0.14;
  const SLOW_SPEED   = 0.01;
  // シーン①③の速度: 移行カーブの中間値（t=0.5）と同程度
  const NORMAL_SPEED = BASE_SPEED + (SLOW_SPEED - BASE_SPEED) * 0.5; // ≈ 0.71
  const SCENE3_SPEED  = 0.015;  // ★ シーン③の速度（小さいほど遅い）

  /* ---- DOM ---- */
  const wrapper  = document.getElementById('wrapper');
  const bgCanvas = document.getElementById('bg-canvas');
  const cvs      = document.getElementById('curve-canvas');
  const bgCtx    = bgCanvas.getContext('2d');
  const ctx      = cvs.getContext('2d');
  const hud      = document.getElementById('hud');

  const imgMap = {
    scene1: { p1: document.getElementById('img-scene1-p1'), p2: document.getElementById('img-scene1-p2') },
    scene2: { p1: document.getElementById('img-scene2-p1'), p2: document.getElementById('img-scene2-p2') },
    scene3: { p1: document.getElementById('img-scene3-p1'), p2: document.getElementById('img-scene3-p2') },
  };

  let W = 0, H = 0;
  let curX = TARGET_X - 20;
  let phase = 'scene1';
  let prevPhase = '';          // ← 空にしておき初回必ず表示させる
  let currentScene = '';       // ← 空にしておき初回必ず表示させる
  let fadeTimer = null;

  /* ---- リサイズ ---- */
  function resize() {
    const aspect = 9 / 16;
    const wh = window.innerHeight, ww = window.innerWidth;
    if (ww / wh > aspect) { H = wh; W = Math.round(H * aspect); }
    else                  { W = ww; H = Math.round(W / aspect); }
    wrapper.style.width  = W + 'px';
    wrapper.style.height = H + 'px';
    bgCanvas.width = W; bgCanvas.height = H;
    cvs.width = W;      cvs.height = H;
  }

  /* ---- 数学 ---- */
  function f1(x) { return Math.sin(x) - 1; }
  function f2(x) { return Math.sin(Math.PI * x) + 1; }

  function getZoom(x) {
    const d = Math.abs(x - TARGET_X);
    if (d > SLOW_RANGE) return 1;
    const t = 1 - d / SLOW_RANGE;
    return 1 + (ZOOM_MAX - 1) * Math.pow(t, 2.5);
  }

  function getSpeed(x) {
    if (phase === 'scene3') return NORMAL_SPEED;
    const d = Math.abs(x - TARGET_X);
    if (d > SLOW_RANGE * 2) return NORMAL_SPEED;
    if (d > ZOOM_RANGE) {
      // NORMAL_SPEED → SLOW_SPEED へ滑らかに移行
      const t = 1 - (d - ZOOM_RANGE) / (SLOW_RANGE * 2 - ZOOM_RANGE);
      return NORMAL_SPEED + (SLOW_SPEED - NORMAL_SPEED) * Math.min(t * 2, 1);
    }
    return SLOW_SPEED;
  }

  function worldToCanvas(wx, wy, cx, cy, zoom) {
    const spanX = (W / zoom) * 0.05;
    const spanY = spanX * (H / W);
    return [
      W / 2 + (wx - cx) / spanX * (W / 2),
      H / 2 - (wy - cy) / spanY * (H / 2)
    ];
  }

  /* ---- 画像位置 (毎フレーム・1/6サイズ) ---- */
  function updateImgPositions() {
    const zoom = getZoom(curX);
    const y1v  = f1(curX), y2v = f2(curX);
    const cx   = curX, cy = (y1v + y2v) / 2;
    const [blueX, blueY] = worldToCanvas(curX, y1v, cx, cy, zoom);
    const [redX,  redY ] = worldToCanvas(curX, y2v, cx, cy, zoom);

    const imgW = Math.round(W / 3);
    const imgH = Math.round(H / 3);

    // 青画像: 上端を青点のY座標に合わせ、X中心を青点に
    const blueLeft = Math.round(blueX - imgW / 2);
    const blueTop  = Math.round(blueY);

    // 赤画像: 下端を赤点のY座標に合わせ、X中心を赤点に
    const redLeft = Math.round(redX - imgW / 2);
    const redTop  = Math.round(redY - imgH);

    Object.values(imgMap).forEach(s => {
      s.p1.style.left   = blueLeft + 'px';
      s.p1.style.top    = blueTop  + 'px';
      s.p1.style.width  = imgW + 'px';
      s.p1.style.height = imgH + 'px';

      s.p2.style.left   = redLeft + 'px';
      s.p2.style.top    = redTop  + 'px';
      s.p2.style.width  = imgW + 'px';
      s.p2.style.height = imgH + 'px';
    });
  }

  /* ---- フェード (強制フラグあり) ---- */
  function fadeToScene(scene, force) {
    if (!force && scene === currentScene) return;
    currentScene = scene;
    const next = imgMap[scene];
    if (fadeTimer) clearTimeout(fadeTimer);
    // 全部消す
    Object.values(imgMap).forEach(s => {
      s.p1.style.opacity = '0';
      s.p2.style.opacity = '0';
    });
    // 少し待ってから表示（CSS transitionが効くように）
    fadeTimer = setTimeout(() => {
      next.p1.style.opacity = '1';
      next.p2.style.opacity = '1';
    }, 50);
  }

  /* ---- 描画: 背景 ---- */
  function drawBackground() {
    bgCtx.fillStyle = '#000';
    bgCtx.fillRect(0, 0, W, H);
  }

  /* ---- 描画: グリッド ---- */
  function drawGrid(cx, cy, zoom) {
    const spanX = (W / zoom) * 0.05;
    const spanY = spanX * (H / W);
    const step  = zoom > 2 ? 1 : 2;

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 0.5;

    const x0 = Math.floor((cx - spanX) / step) * step;
    const x1 = Math.ceil ((cx + spanX) / step) * step;
    for (let gx = x0; gx <= x1 + 1e-9; gx += step) {
      const [px] = worldToCanvas(gx, 0, cx, cy, zoom);
      ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
    }
    const y0 = Math.floor((cy - spanY) / step) * step;
    const y1 = Math.ceil ((cy + spanY) / step) * step;
    for (let gy = y0; gy <= y1 + 1e-9; gy += step) {
      const [, py] = worldToCanvas(0, gy, cx, cy, zoom);
      ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
    }

    // 軸
    ctx.strokeStyle = 'rgba(255,255,255,0.32)';
    ctx.lineWidth = 1;
    const [, axisY] = worldToCanvas(0, 0, cx, cy, zoom);
    const [axisX]   = worldToCanvas(0, 0, cx, cy, zoom);
    ctx.beginPath(); ctx.moveTo(0, axisY); ctx.lineTo(W, axisY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(axisX, 0); ctx.lineTo(axisX, H); ctx.stroke();

    // 目盛りラベル（整数のみ・9px）
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = "9px 'Courier New', monospace";

    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (let gx = x0; gx <= x1 + 1e-9; gx += step) {
      const ig = Math.round(gx);
      const [px] = worldToCanvas(ig, 0, cx, cy, zoom);
      ctx.fillText(ig, px, Math.min(axisY + 2, H - 12));
    }
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    for (let gy = y0; gy <= y1 + 1e-9; gy += step) {
      if (Math.abs(gy) < 1e-9) continue;
      const ig = Math.round(gy);
      const [, py] = worldToCanvas(0, ig, cx, cy, zoom);
      ctx.fillText(ig, Math.max(axisX - 2, 22), py);
    }
    ctx.restore();
  }

  /* ---- 描画: 曲線 ---- */
  function drawCurve(fn, color, cx, cy, zoom) {
    const spanX = (W / zoom) * 0.05;
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = zoom > 8 ? 2.5 : 1.8;
    let first = true;
    for (let i = 0; i <= 800; i++) {
      const wx = cx - spanX + 2 * spanX * i / 800;
      const [px, py] = worldToCanvas(wx, fn(wx), cx, cy, zoom);
      first ? (ctx.moveTo(px, py), first = false) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  /* ---- 描画: 点 ---- */
  function drawDot(wx, wy, color, glow, cx, cy, zoom) {
    const [px, py] = worldToCanvas(wx, wy, cx, cy, zoom);
    const r = zoom > 8 ? 9 : 6;
    ctx.save();
    ctx.shadowColor = glow; ctx.shadowBlur = 16;
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  /* ---- 描画: ラベル ---- */
  function drawCurveLabel(wx, wy, text, color, cx, cy, zoom) {
    if (zoom < 4) return;
    const [px, py] = worldToCanvas(wx, wy, cx, cy, zoom);
    ctx.save();
    ctx.font = `${Math.round(11 + zoom * 0.3)}px 'Courier New', monospace`;
    ctx.fillStyle = color;
    ctx.fillText(text, px + 11, py - 8);
    ctx.restore();
  }

  /* ---- メインループ ---- */
  function frame() {
    const zoom  = getZoom(curX);
    const speed = getSpeed(curX);
    const y1v   = f1(curX), y2v = f2(curX);
    const cx    = curX, cy = (y1v + y2v) / 2;

    drawBackground();
    ctx.clearRect(0, 0, W, H);
    drawGrid(cx, cy, zoom);
    drawCurve(f1, '#5599ff', cx, cy, zoom);
    drawCurve(f2, '#ff5588', cx, cy, zoom);
    drawDot(curX, y1v, '#5599ff', '#3366ff', cx, cy, zoom);
    drawDot(curX, y2v, '#ff5588', '#cc2255', cx, cy, zoom);
    drawCurveLabel(curX, y1v, 'y = sin x \u2212 1',    '#88bbff', cx, cy, zoom);
    drawCurveLabel(curX, y2v, 'y = sin(\u03c0x) + 1', '#ff88aa', cx, cy, zoom);

    if (zoom > 6) {
      const dy = Math.abs(y1v - y2v);
      ctx.save();
      ctx.font = "11px 'Courier New', monospace";
      ctx.fillStyle = 'rgba(255,255,180,0.9)';
      ctx.fillText('\u0394y = ' + dy.toFixed(5), W / 2 - 38, 22);
      ctx.restore();
    }

    hud.textContent = 'x = ' + curX.toFixed(4) +
                      '   y\u2081 = ' + y1v.toFixed(4) +
                      '   y\u2082 = ' + y2v.toFixed(4);

    updateImgPositions();

    /* ---- フェーズ判定 ---- */
    const dist = Math.abs(curX - TARGET_X);
    if (phase !== 'scene3') {
      // ★ シーン②に入る条件を SCENE2_HALF に絞る
      if (dist <= SCENE2_HALF) {
        if (phase !== 'scene2') phase = 'scene2';
      } else if (dist > SLOW_RANGE * 2) {
        if (phase !== 'scene1') phase = 'scene1';
      }
    }

    // フェーズが変わったら（または初回）フェード
    if (phase !== prevPhase) {
      fadeToScene(phase, phase !== prevPhase);
      prevPhase = phase;
    }

    curX += speed;

    // シーン②→③の切り替え
    if (curX > TARGET_X + SCENE2_HALF && phase === 'scene2') {
      phase = 'scene3';
    }
    // ループ
    if (curX > TARGET_X + 30) {
      curX = TARGET_X - 20;
      phase = 'scene1';
      prevPhase = ''; // 強制再表示
    }

    requestAnimationFrame(frame);
  }

  /* ---- 起動 ---- */
  resize();
  window.addEventListener('resize', resize);
  // 初回: 強制的にシーン①を表示
  updateImgPositions();
  fadeToScene('scene1', true);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
